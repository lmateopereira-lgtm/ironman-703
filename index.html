<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
  // ── CONFIG — fill these in after setup ──────────────────────────────────────
  const JSONBIN_KEY = "$2a$10$zckRvYBHs/vaGLVV7./X4e9wDF7ot/eCyWIw7agfqnQJPZQ8NCWmS";
  const JSONBIN_BIN = "6a18b16621f9ee59d29713b";

  // ── JSONBin Storage ──────────────────────────────────────────────────────────
  const USE_CLOUD = JSONBIN_KEY && JSONBIN_BIN;
  let _cache = null, _dirty = false, _timer = null;

  async function fetchBin() {
    if (_cache) return _cache;
    if (!USE_CLOUD) {
      try { _cache = JSON.parse(localStorage.getItem("ironman_data") || "{}"); }
      catch { _cache = {}; }
      return _cache;
    }
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`,
        { headers: { "X-Master-Key": JSONBIN_KEY } });
      const data = await res.json();
      _cache = data.record || {};
    } catch { _cache = {}; }
    return _cache;
  }

  async function flushBin() {
    if (!_dirty || !_cache) return;
    _dirty = false;
    if (!USE_CLOUD) { localStorage.setItem("ironman_data", JSON.stringify(_cache)); return; }
    try {
      await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
        body: JSON.stringify(_cache)
      });
    } catch { _dirty = true; }
  }

  function scheduleSave() { _dirty = true; clearTimeout(_timer); _timer = setTimeout(flushBin, 1200); }

  async function storageGet(key) { const d = await fetchBin(); return d[key] ?? null; }
  async function storageSet(key, value) { await fetchBin(); _cache[key] = value; scheduleSave(); }
  function storageIsCloud() { return USE_CLOUD; }

  // ── Constants ────────────────────────────────────────────────────────────────
  const T = {
    bg:"#F7F4EF", bgCard:"#FFFFFF", bgMuted:"#F0EDE7", border:"#E2DDD6",
    text:"#1C1917", textMid:"#6B5E52", textSoft:"#A8998C",
    accent:"#E05C2A", accentBg:"#FEF0EB",
    green:"#2D7A4F", greenBg:"#EBF5EF",
    blue:"#2563EB", blueBg:"#EFF4FF",
    yellow:"#D97706", yellowBg:"#FEF9EB",
  };

  const RACE_DATE = new Date("2026-03-07T23:59:59");
  const DISC_EMOJI = { swim:"🏊", bike:"🚴", run:"🏃", strength:"💪", rest:"😴", transition:"🔄" };
  const DISC_COLOR = { swim:T.blue, bike:T.yellow, run:T.green, strength:"#7C3AED", rest:T.textSoft, transition:"#0891B2" };

  function daysUntil() {
    const now = new Date();
    const race = new Date(2027, 2, 7); // March 7 2027 — month is 0-indexed
    const diffMs = race - new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return Math.max(0, Math.ceil(diffMs / 86400000));
  }
  function weeksUntil() { return (daysUntil() / 7).toFixed(1); }
  function progressPct() {
    const start = new Date(2026, 5, 1); // Jun 1 2026
    const race = new Date(2027, 2, 7); // Mar 7 2027
    const today_ = new Date(); const now_ = new Date(today_.getFullYear(), today_.getMonth(), today_.getDate());
    const total = Math.ceil((race - start) / 86400000);
    const done = Math.ceil((now_ - start) / 86400000);
    return Math.min(100, Math.max(0, Math.round((done / total) * 100)));
  }
  function today() { return new Date().toISOString().slice(0,10); }
  function fmt(d) { return new Date(d+"T12:00:00").toLocaleDateString("es-UY",{weekday:"short",day:"numeric",month:"short"}); }
  function normDisc(s="") {
    s = s.toLowerCase();
    if (s.includes("cicl")||s.includes("bici")||s.includes("bike")||s.includes("ride")) return "bike";
    if (s.includes("run")||s.includes("corre")) return "run";
    if (s.includes("nat")||s.includes("swim")) return "swim";
    if (s.includes("fuerz")||s.includes("strength")) return "strength";
    if (s.includes("transi")) return "transition";
    return "rest";
  }

  // ── Claude API ───────────────────────────────────────────────────────────────
  async function callClaude({ system, messages, maxTokens=1200, imageBase64=null }) {
    const msgs = imageBase64
      ? [{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:imageBase64 }},
          { type:"text", text: messages[messages.length-1].content }
        ]}]
      : messages;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages: msgs })
    });
    const data = await res.json();
    return data.content?.[0]?.text || "";
  }

  // ── GPX Parser ───────────────────────────────────────────────────────────────
  function parseGPX(xmlStr) {
    const doc = new DOMParser().parseFromString(xmlStr, "application/xml");
    const pts = Array.from(doc.querySelectorAll("trkpt"));
    if (!pts.length) return null;
    const coords = pts.map(p => ({
      lat: parseFloat(p.getAttribute("lat")),
      lon: parseFloat(p.getAttribute("lon")),
      ele: parseFloat(p.querySelector("ele")?.textContent || 0),
      time: p.querySelector("time")?.textContent || null,
    }));
    let dist = 0;
    for (let i=1;i<coords.length;i++) {
      const R=6371000, dLat=(coords[i].lat-coords[i-1].lat)*Math.PI/180, dLon=(coords[i].lon-coords[i-1].lon)*Math.PI/180;
      const a=Math.sin(dLat/2)**2+Math.cos(coords[i-1].lat*Math.PI/180)*Math.cos(coords[i].lat*Math.PI/180)*Math.sin(dLon/2)**2;
      dist += R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    const eles=coords.map(c=>c.ele).filter(Boolean);
    const gains=[]; for(let i=1;i<eles.length;i++){const d=eles[i]-eles[i-1];if(d>0)gains.push(d);}
    const elevGain=gains.reduce((a,b)=>a+b,0);
    const name=doc.querySelector("name")?.textContent||doc.querySelector("trk > name")?.textContent||"Sin nombre";
    let durationMin=null;
    if(coords[0]?.time&&coords[coords.length-1]?.time)
      durationMin=Math.round((new Date(coords[coords.length-1].time)-new Date(coords[0].time))/60000);
    const bounds={minLat:Math.min(...coords.map(c=>c.lat)),maxLat:Math.max(...coords.map(c=>c.lat)),minLon:Math.min(...coords.map(c=>c.lon)),maxLon:Math.max(...coords.map(c=>c.lon))};
    return { coords:coords.filter((_,i,a)=>i===0||i===a.length-1||i%Math.max(1,Math.floor(a.length/500))===0),
      dist, elevGain, name, durationMin, bounds, center:[(bounds.minLat+bounds.maxLat)/2,(bounds.minLon+bounds.maxLon)/2] };
  }

  // ── Shared components ────────────────────────────────────────────────────────
  const { useState, useEffect, useRef } = React;

  function Card({title,children,style={}}) {
    return <div style={{background:"#fff",margin:"12px 16px 0",borderRadius:14,padding:"16px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",border:`1px solid ${T.border}`,...style}}>
      {title&&<div style={{fontSize:11,color:T.textSoft,letterSpacing:2,textTransform:"uppercase",fontFamily:"system-ui,sans-serif",marginBottom:12}}>{title}</div>}
      {children}
    </div>;
  }

  function LabeledInput({label,type="text",value,onChange,placeholder,step,style={}}) {
    return <div style={style}>
      {label&&<div style={{fontSize:10,color:T.textSoft,letterSpacing:1,textTransform:"uppercase",fontFamily:"system-ui,sans-serif",marginBottom:5}}>{label}</div>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder||""} step={step}
        style={{width:"100%",background:"#fff",border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",color:T.text,fontSize:14,fontFamily:"system-ui,sans-serif",boxSizing:"border-box"}}/>
    </div>;
  }

  function FitUpload({fileRef,onChange,fileName,label,note}) {
    return <div style={{background:T.bgMuted,border:`1px dashed ${T.border}`,borderRadius:10,padding:"13px",textAlign:"center"}}>
      <input ref={fileRef} type="file" accept=".fit" onChange={onChange} style={{display:"none"}}/>
      <button onClick={()=>fileRef.current.click()}
        style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 16px",color:T.textMid,cursor:"pointer",fontFamily:"system-ui,sans-serif",fontSize:13}}>
        📎 {label||"Subir .fit"}
      </button>
      {fileName&&<div style={{marginTop:6,fontSize:12,color:T.green,fontFamily:"system-ui,sans-serif"}}>✓ {fileName}</div>}
      {note&&<div style={{marginTop:4,fontSize:11,color:T.textSoft,fontFamily:"system-ui,sans-serif"}}>{note}</div>}
    </div>;
  }

  function Btn({onClick,saved,disabled,children,color}) {
    const bg = saved?T.greenBg:disabled?T.bgMuted:color||T.accent;
    const fg = saved?T.green:disabled?T.textSoft:"#fff";
    return <button onClick={onClick} disabled={disabled}
      style={{background:bg,color:fg,border:saved?`1px solid ${T.green}44`:"none",borderRadius:10,padding:"13px",fontWeight:600,fontSize:14,cursor:disabled?"default":"pointer",fontFamily:"system-ui,sans-serif",transition:"all .3s",width:"100%"}}>
      {saved?"✓ Guardado":children}
    </button>;
  }

  function WorkoutRow({w,expanded}) {
    const disc=w.discipline||"run", color=DISC_COLOR[disc]||T.textSoft;
    return <div style={{background:"#fff",borderRadius:10,padding:"11px 13px",marginBottom:7,display:"flex",alignItems:"flex-start",gap:11,border:`1px solid ${T.border}`,borderLeft:`3px solid ${color}`}}>
      <span style={{fontSize:20,lineHeight:1.2}}>{DISC_EMOJI[disc]||"🏋️"}</span>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:600,color:T.text}}>{w.task||disc.charAt(0).toUpperCase()+disc.slice(1)}</span>
          <span style={{fontSize:10,color:T.textSoft,fontFamily:"system-ui,sans-serif"}}>{fmt(w.date)}</span>
        </div>
        <div style={{fontSize:11,color:T.textSoft,marginTop:2,display:"flex",gap:9,flexWrap:"wrap",fontFamily:"system-ui,sans-serif"}}>
          {w.distance&&<span>📏 {w.distance}{disc==="swim"?"m":"km"}</span>}
          {w.duration&&<span>⏱ {w.duration}min</span>}
          {w.avgHR&&<span>❤️ {w.avgHR}bpm</span>}
          {w.rpe&&<span>💥 RPE {w.rpe}</span>}
          {w.zone&&<span>🎯 {w.zone}</span>}
        </div>
        {expanded&&w.notes&&<div style={{fontSize:11,color:T.textSoft,marginTop:4,fontStyle:"italic"}}>{w.notes}</div>}
      </div>
    </div>;
  }

  function WeekStrip({workouts,plan}) {
    const days=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    const now=new Date();
    const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()-now.getDay()+i);return d.toISOString().slice(0,10);});
    return <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {weekDays.map((date,i)=>{
        const hasW=Object.values(workouts).some(w=>w.date===date);
        const isT=date===today();
        const pi=plan?.sessions?.filter(s=>s.date===date)||[];
        const done=pi.length>0&&pi.every(s=>s.completed);
        const disc=pi.length>0?normDisc(pi[0].sport):null;
        return <div key={date} style={{textAlign:"center"}}>
          <div style={{fontSize:8,color:T.textSoft,marginBottom:3,fontFamily:"system-ui,sans-serif"}}>{days[i]}</div>
          <div style={{background:hasW||done?T.greenBg:isT?T.accentBg:T.bgMuted,borderRadius:8,padding:"7px 2px",border:`1px solid ${isT?T.accent:hasW||done?T.green+"44":T.border}`,position:"relative"}}>
            {hasW||done?<span style={{fontSize:13,color:T.green}}>✓</span>:disc?<span style={{fontSize:11}}>{DISC_EMOJI[disc]}</span>:<span style={{fontSize:10,color:T.border}}>—</span>}
            {pi.length>1&&!hasW&&<span style={{position:"absolute",top:-4,right:-4,fontSize:9,background:T.accent,color:"#fff",borderRadius:"50%",width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{pi.length}</span>}
          </div>
        </div>;
      })}
    </div>;
  }

  // ── RouteMap ─────────────────────────────────────────────────────────────────
  function RouteMap({route,height=280}) {
    const mapRef=useRef(), instRef=useRef(), id=useRef("m"+Math.random().toString(36).slice(2));
    useEffect(()=>{
      if(!route||!mapRef.current)return;
      if(!document.getElementById("lf-css")){
        const l=document.createElement("link");l.id="lf-css";l.rel="stylesheet";
        l.href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
        document.head.appendChild(l);
      }
      const init=()=>{
        if(instRef.current){instRef.current.remove();instRef.current=null;}
        const L=window.L, map=L.map(id.current,{zoomControl:true,scrollWheelZoom:false});
        instRef.current=map;
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
        const color=route.discipline==="bike"?T.yellow:route.discipline==="run"?T.green:route.discipline==="swim"?T.blue:T.accent;
        const ll=route.coords.map(c=>[c.lat,c.lon]);
        const poly=L.polyline(ll,{color,weight:4,opacity:.85}).addTo(map);
        const dot=f=>L.divIcon({html:`<div style="width:12px;height:12px;border-radius:50%;background:${f};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,className:"",iconSize:[12,12],iconAnchor:[6,6]});
        L.marker(ll[0],{icon:dot(color)}).addTo(map).bindPopup("<b>Inicio</b>");
        L.marker(ll[ll.length-1],{icon:dot("#1C1917")}).addTo(map).bindPopup("<b>Fin</b>");
        map.fitBounds(poly.getBounds(),{padding:[18,18]});
      };
      if(window.L){init();}else{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";s.onload=init;document.head.appendChild(s);}
      return()=>{if(instRef.current){instRef.current.remove();instRef.current=null;}};
    },[route]);
    return <div ref={mapRef} id={id.current} style={{width:"100%",height,borderRadius:12,overflow:"hidden",zIndex:0,border:`1px solid ${T.border}`}}/>;
  }

  function ElevChart({coords,color=T.accent}) {
    const W=320,H=56,P=4;
    const eles=coords.map(c=>c.ele).filter(e=>e>0);
    if(eles.length<2)return null;
    const mn=Math.min(...eles),mx=Math.max(...eles);
    if(mx===mn)return null;
    const pts=eles.map((e,i)=>`${P+(i/(eles.length-1))*(W-P*2)},${P+(1-(e-mn)/(mx-mn))*(H-P*2)}`).join(" ");
    return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
      <polygon points={`${P},${H-P} ${pts} ${W-P},${H-P}`} fill={color+"22"}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>;
  }

  // ════════════════════════════════════════════════════════════════════════════
  // HOME TAB
  // ════════════════════════════════════════════════════════════════════════════
  function HomeTab({workouts,health,notes,plan}) {
    const pct=progressPct(), todayKey=today();
    const allW=Object.values(workouts);
    const totalSwim=allW.filter(w=>w.discipline==="swim").reduce((a,w)=>a+(Number(w.distance)||0),0);
    const totalBike=allW.filter(w=>w.discipline==="bike").reduce((a,w)=>a+(Number(w.distance)||0),0);
    const totalRun=allW.filter(w=>w.discipline==="run").reduce((a,w)=>a+(Number(w.distance)||0),0);
    const todayH=health[todayKey]||{};
    const now=new Date(), wStart=new Date(now); wStart.setDate(now.getDate()-now.getDay());
    const thisWeek=allW.filter(w=>new Date(w.date+"T12:00:00")>=wStart);
    const todayPlan=plan?.sessions?.filter(s=>s.date===todayKey)||[];

    return <div>
      <div style={{background:"linear-gradient(160deg,#0e1b30,#0b2244,#080e1a)",padding:"26px 20px 22px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,#e8ff4718,transparent 70%)"}}/>
        <div style={{fontSize:72,fontWeight:400,color:T.accent,lineHeight:1,letterSpacing:-2}}>{daysUntil()}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",letterSpacing:3,textTransform:"uppercase",marginTop:2,fontFamily:"system-ui,sans-serif"}}>días restantes · {weeksUntil()} semanas</div>
        <div style={{marginTop:18,background:"rgba(255,255,255,0.1)",borderRadius:8,height:6,overflow:"hidden"}}>
          <div style={{width:pct+"%",height:"100%",background:`linear-gradient(90deg,${T.accent},#F5883A)`,borderRadius:8,transition:"width 1.2s ease"}}/>
        </div>
        <div style={{marginTop:5,fontSize:10,color:"rgba(255,255,255,0.4)",fontFamily:"system-ui,sans-serif"}}>{pct}% del ciclo completado</div>
      </div>

      <div style={{padding:"0 16px"}}>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          {[{icon:"🏊",label:"Swim",val:(totalSwim/1000).toFixed(1)+"km",c:T.blue,bg:T.blueBg},{icon:"🚴",label:"Bike",val:totalBike.toFixed(0)+"km",c:T.yellow,bg:T.yellowBg},{icon:"🏃",label:"Run",val:totalRun.toFixed(1)+"km",c:T.green,bg:T.greenBg}].map(({icon,label,val,c,bg})=>(
            <div key={label} style={{flex:1,background:bg,borderRadius:10,padding:"10px 6px",textAlign:"center",border:`1px solid ${c}22`}}>
              <div style={{fontSize:17}}>{icon}</div>
              <div style={{fontSize:14,fontWeight:700,color:c,marginTop:3}}>{val}</div>
              <div style={{fontSize:9,color:T.textSoft,textTransform:"uppercase",letterSpacing:1,fontFamily:"system-ui,sans-serif"}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      <Card title={"Hoy · "+fmt(todayKey)}>
        {todayPlan.length>0
          ? todayPlan.map((s,i)=><PlanSessionRow key={i} s={s} compact/>)
          : <div style={{fontSize:13,color:T.textSoft,fontStyle:"italic"}}>Sin sesiones planificadas. Cargá tu plantilla en 📋</div>
        }
        {todayH.sleep&&<div style={{marginTop:10,background:T.bgMuted,borderRadius:10,padding:"9px 13px",fontSize:12,color:T.textMid,display:"flex",gap:16,flexWrap:"wrap",fontFamily:"system-ui,sans-serif"}}>
          {todayH.sleep&&<span>😴 <b>{todayH.sleep}h</b></span>}
          {todayH.hrv&&<span>💓 HRV <b>{todayH.hrv}</b></span>}
          {todayH.restingHR&&<span>❤️ <b>{todayH.restingHR}bpm</b></span>}
        </div>}
      </Card>

      <Card title="Esta semana">
        <WeekStrip workouts={workouts} plan={plan}/>
        {thisWeek.length>0&&<div style={{marginTop:12}}>{thisWeek.slice(-3).map((w,i)=><WorkoutRow key={i} w={w}/>)}</div>}
      </Card>

      {notes.length>0&&<Card title="Última nota">
        <div style={{background:T.accentBg,borderRadius:10,padding:"11px 13px",fontSize:13,color:T.textMid,borderLeft:`3px solid ${T.accent}`,lineHeight:1.65}}>
          <div style={{fontSize:10,color:T.accent,marginBottom:4,fontFamily:"system-ui,sans-serif",textTransform:"uppercase",letterSpacing:1}}>{fmt(notes[notes.length-1].date)}</div>
          {notes[notes.length-1].text}
        </div>
      </Card>}
      <div style={{height:16}}/>
    </div>;
  }

  // ════

  const JSONBIN_KEY = "$2a$10$zckRvYBHs/vaGLVV7./X4e9wDF7ot/eCyWIw7agfqnQJPZQ8NCWmS";
  const JSONBIN_BIN = "6a18b16621f9ee59d29713b";

  // ── JSONBin Storage ──────────────────────────────────────────────────────────
  const USE_CLOUD = JSONBIN_KEY && JSONBIN_BIN;
  let _cache = null, _dirty = false, _timer = null;

  async function fetchBin() {
    if (_cache) return _cache;
    if (!USE_CLOUD) {
      try { _cache = JSON.parse(localStorage.getItem("ironman_data") || "{}"); }
      catch { _cache = {}; }
      return _cache;

    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`,
        { headers: { "X-Master-Key": JSONBIN_KEY } });
      const data = await res.json();
      _cache = data.record || {};
    } catch { _cache = {}; }
    return _cache;
  }

  async function flushBin() {
    if (!_dirty || !_cache) return;
    _dirty = false;
    if (!USE_CLOUD) { localStorage.setItem("ironman_data", JSON.stringify(_cache)); return; }
    try {
      await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
        body: JSON.stringify(_cache)
      });
    } catch { _dirty = true; }
  }

  function scheduleSave() { _dirty = true; clearTimeout(_timer); _timer = setTimeout(flushBin, 1200); }

  async function storageGet(key) { const d = await fetchBin(); return d[key] ?? null; }
  async function storageSet(key, value) { await fetchBin(); _cache[key] = value; scheduleSave(); }
  function storageIsCloud() { return USE_CLOUD; }

  // ── Constants ────────────────────────────────────────────────────────────────
  const T = {
    bg:"#F7F4EF", bgCard:"#FFFFFF", bgMuted:"#F0EDE7", border:"#E2DDD6",
    text:"#1C1917", textMid:"#6B5E52", textSoft:"#A8998C",

  const RACE_DATE  = new Date("2026-03-07T23:59:59");

  const DISC_COLOR = { swim:T.blue, bike:T.yellow, run:T.green, strength:"#7C3AED", rest:T.textSoft, transition:"#0891B2" };

  function daysUntil()   { return Math.max(0, Math.ceil((RACE_DATE - new Date()) / 86400000)); }
  function weeksUntil()  { return (daysUntil() / 7).toFixed(1); }
  function progressPct() {
    const total = Math.ceil((RACE_DATE - new Date("2025-10-01")) / 86400000);
    return Math.min(100, Math.max(0, Math.round(((total - daysUntil()) / total) * 100)));

  function today() { return new Date().toISOString().slice(0,10); }
  function fmt(d)  { return new Date(d+"T12:00:00").toLocaleDateString("es-UY",{weekday:"short",day:"numeric",month:"short"}); }
  function normDisc(s="") {
    s = s.toLowerCase();
    if (s.includes("cicl")||s.includes("bici")||s.includes("bike")||s.includes("ride")) return "bike";
    if (s.includes("run")||s.includes("corre")) return "run";

  // ── Claude API ───────────────────────────────────────────────────────────────
  async function callClaude({ system, messages, maxTokens=1200, imageBase64=null }) {
    const msgs = imageBase64

          { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:imageBase64 }},

      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages: msgs })
    });
    const data = await res.json();
    return data.content?.[0]?.text || "";
  }

  // ── GPX Parser ───────────────────────────────────────────────────────────────
  function parseGPX(xmlStr) {
    const doc  = new DOMParser().parseFromString(xmlStr, "application/xml");
    const pts  = Array.from(doc.querySelectorAll("trkpt"));
    if (!pts.length) return null;
    const coords = pts.map(p => ({
      lat: parseFloat(p.getAttribute("lat")),
      lon: parseFloat(p.getAttribute("lon")),
      ele: parseFloat(p.querySelector("ele")?.textContent || 0),
      time: p.querySelector("time")?.textContent || null,
    }));
    let dist = 0;
    for (let i=1;i<coords.length;i++) {
      const R=6371000, dLat=(coords[i].lat-coords[i-1].lat)*Math.PI/180, dLon=(coords[i].lon-coords[i-1].lon)*Math.PI/180;
      const a=Math.sin(dLat/2)**2+Math.cos(coords[i-1].lat*Math.PI/180)*Math.cos(coords[i].lat*Math.PI/180)*Math.sin(dLon/2)**2;
      dist += R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    const eles=coords.map(c=>c.ele).filter(Boolean);
    const gains=[]; for(let i=1;i<eles.length;i++){const d=eles[i]-eles[i-1];if(d>0)gains.push(d);}
    const elevGain=gains.reduce((a,b)=>a+b,0);
    const name=doc.querySelector("name")?.textContent||doc.querySelector("trk > name")?.textContent||"Sin nombre";
    let durationMin=null;
    if(coords[0]?.time&&coords[coords.length-1]?.time)
      durationMin=Math.round((new Date(coords[coords.length-1].time)-new Date(coords[0].time))/60000);
    const bounds={minLat:Math.min(...coords.map(c=>c.lat)),maxLat:Math.max(...coords.map(c=>c.lat)),minLon:Math.min(...coords.map(c=>c.lon)),maxLon:Math.max(...coords.map(c=>c.lon))};
    return { coords:coords.filter((_,i,a)=>i===0||i===a.length-1||i%Math.max(1,Math.floor(a.length/500))===0),
      dist, elevGain, name, durationMin, bounds, center:[(bounds.minLat+bounds.maxLat)/2,(bounds.minLon+bounds.maxLon)/2] };
  }

  // ── Shared components ────────────────────────────────────────────────────────
  const { useState, useEffect, useRef } = React;

  function Card({title,children,style={}}) {

  // ── RouteMap ─────────────────────────────────────────────────────────────────
  function RouteMap({route,height=280}) {
    const mapRef=useRef(), instRef=useRef(), id=useRef("m"+Math.random().toString(36).slice(2));
    useEffect(()=>{
      if(!route||!mapRef.current)return;
      if(!document.getElementById("lf-css")){
        const l=document.createElement("link");l.id="lf-css";l.rel="stylesheet";
        l.href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
        document.head.appendChild(l);
      }
      const init=()=>{
        if(instRef.current){instRef.current.remove();instRef.current=null;}
        const L=window.L, map=L.map(id.current,{zoomControl:true,scrollWheelZoom:false});
        instRef.current=map;
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
        const color=route.discipline==="bike"?T.yellow:route.discipline==="run"?T.green:route.discipline==="swim"?T.blue:T.accent;
        const ll=route.coords.map(c=>[c.lat,c.lon]);
        const poly=L.polyline(ll,{color,weight:4,opacity:.85}).addTo(map);
        const dot=f=>L.divIcon({html:`<div style="width:12px;height:12px;border-radius:50%;background:${f};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,className:"",iconSize:[12,12],iconAnchor:[6,6]});
        L.marker(ll[0],{icon:dot(color)}).addTo(map).bindPopup("<b>Inicio</b>");
        L.marker(ll[ll.length-1],{icon:dot("#1C1917")}).addTo(map).bindPopup("<b>Fin</b>");
        map.fitBounds(poly.getBounds(),{padding:[18,18]});
      };
      if(window.L){init();}else{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";s.onload=init;document.head.appendChild(s);}
      return()=>{if(instRef.current){instRef.current.remove();instRef.current=null;}};
    },[route]);
    return <div ref={mapRef} id={id.current} style={{width:"100%",height,borderRadius:12,overflow:"hidden",zIndex:0,border:`1px solid ${T.border}`}}/>;
  }

  function ElevChart({coords,color=T.accent}) {
    const W=320,H=56,P=4;
    const eles=coords.map(c=>c.ele).filter(e=>e>0);
    if(eles.length<2)return null;
    const mn=Math.min(...eles),mx=Math.max(...eles);
    if(mx===mn)return null;
    const pts=eles.map((e,i)=>`${P+(i/(eles.length-1))*(W-P*2)},${P+(1-(e-mn)/(mx-mn))*(H-P*2)}`).join(" ");
    return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
      <polygon points={`${P},${H-P} ${pts} ${W-P},${H-P}`} fill={color+"22"}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round"/>
    </svg>;
  }

        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:T.textSoft,letterSpacing:1,textTransform:"uppercase",fontFamily:"system-ui,sans-serif",marginBottom:6}}>Calidad sueño</div>
          <div style={{display:"flex",gap:6}}>
            {[1,2,3,4,5].map(n=><button key={n} onClick={()=>onSleepQ&&onSleepQ(n)}
              style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${s.actualSleepQuality===n?T.accent:T.border}`,cursor:"pointer",fontFamily:"system-ui,sans-serif",fontSize:13,background:s.actualSleepQuality===n?T.accentBg:"#fff",color:s.actualSleepQuality===n?T.accent:T.textMid,fontWeight:s.actualSleepQuality===n?700:400}}>{n}</button>)}
          </div>
        </div>
        <textarea value={s.feelingNote||""} onChange={e=>onFeel&&onFeel(e.target.value)} placeholder="¿Cómo te sentiste?" rows={2}
          style={{width:"100%",background:T.bgMuted,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 11px",color:T.text,fontSize:13,fontFamily:"system-ui,sans-serif",boxSizing:"border-box",resize:"vertical",marginBottom:10}}/>
        <div style={{display:"flex",gap:8}}>
          {!s.completed&&<button onClick={()=>{onComplete&&onComplete(true);setOpen(false);}}
            style={{flex:1,background:T.greenBg,border:`1px solid ${T.green}44`,borderRadius:8,padding:"9px",color:T.green,cursor:"pointer",fontFamily:"system-ui,sans-serif",fontSize:13,fontWeight:600}}>✓ Marcar hecha</button>}
          {!s.completed&&onLog&&<button onClick={()=>{onLog();setOpen(false);}}
            style={{flex:1,background:T.bgMuted,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px",color:T.textMid,cursor:"pointer",fontFamily:"system-ui,sans-serif",fontSize:13}}>+ Logear</button>}
          {s.completed&&<button onClick={()=>onComplete&&onComplete(false)}
            style={{flex:1,background:"#FEF2F2",border:"1px solid #FCA5A544",borderRadius:8,padding:"9px",color:"#DC2626",cursor:"pointer",fontFamily:"system-ui,sans-serif",fontSize:12}}>↩ Desmarcar</button>}
        </div>
      </div>}
    </div>;
  }

  function PlanTab({plan,onSave,workouts,onSaveWorkout}) {
    const [imgPrev,setImgPrev]=useState(null), [imgB64,setImgB64]=useState(null);
    const [scanning,setScanning]=useState(false), [error,setError]=useState("");
    const fileRef=useRef();

    const handleImg=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setImgPrev(ev.target.result);setImgB64(ev.target.result.split(",")[1]);};r.readAsDataURL(f);};

    const scanPlan=async()=>{
      if(!imgB64)return;setScanning(true);setError("");
      const sys=`Sos un asistente de análisis de planillas de entrenamiento de triatlón. Extraés datos de imágenes de planillas Excel y devolvés SOLO JSON válido sin markdown. Estructura: {"weekLabel":"string","sessions":[{"date":"YYYY-MM-DD","day":"Lunes","sport":"Ciclismo","task":"nombre","description":"detalle","zone":"Z4/Z5","completed":false,"actualRpe":null,"actualSleepHours":null,"actualSleepQuality":null,"feelingNote":""}]}. Si no hay año asumí 2026. SOLO JSON.`;
      try {
        const raw=await callClaude({system:sys,messages:[{role:"user",content:"Extraé todos los entrenamientos. SOLO JSON."}],maxTokens:2000,imageBase64:imgB64});
        const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
        await onSave({...parsed,uploadedAt:today(),imgPreview:imgPrev});
        setImgPrev(null);setImgB64(null);
      } catch(e){setError("No pude leer la plantilla. Intentá con mejor iluminación.");}
      setScanning(false);
    };

    const markComplete=async(idx,field,value)=>{
      await onSave({...plan,sessions:plan.sessions.map((s,i)=>i===idx?{...s,[field]:value}:s)});
    };
    const logFromPlan=async(s)=>{
      const disc=normDisc(s.sport),key=s.date+"_"+Date.now();
      await onSaveWorkout({...workouts,[key]:{id:key,date:s.date,discipline:disc,task:s.task,description:s.description,zone:s.zone,rpe:s.actualRpe||"",distance:"",duration:"",avgHR:"",maxHR:"",calories:"",notes:s.feelingNote||"",fromPlan:true}});
      await markComplete(plan.sessions.indexOf(s),"completed",true);
    };

    const grouped=plan?.sessions?plan.sessions.reduce((acc,s,i)=>{const k=s.date+"_"+s.day;if(!acc[k])acc[k]={date:s.date,day:s.day,items:[]};acc[k].items.push({...s,_idx:i});return acc;},{}): {};

    return <div style={{padding:"16px"}}>
      <Card title="Plantilla semanal">
        <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
        <div style={{background:T.bgMuted,border:`1px dashed ${T.border}`,borderRadius:10,padding:"16px",textAlign:"center",marginBottom:10}}>
          {imgPrev?<img src={imgPrev} alt="plantilla" style={{width:"100%",borderRadius:8,maxHeight:180,objectFit:"cover"}}/>:<div style={{fontSize:13,color:T.textSoft,fontStyle:"italic",padding:"12px 0"}}>Foto del Excel que te manda el coach</div>}
          <button onClick={()=>fileRef.current.click()} style={{marginTop:10,background:"#fff",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 16px",color:T.textMid,cursor:"pointer",fontFamily:"system-ui,sans-serif",fontSize:13}}>{imgPrev?"Cambiar foto":"📸 Subir foto"}</button>
        </div>
        {imgPrev&&<Btn onClick={scanPlan} disabled={scanning}>{scanning?"🔍 Leyendo plantilla…":"🔍 Escanear con IA"}</Btn>}
        {error&&<div style={{marginTop:8,fontSize:12,color:"#DC2626",fontFamily:"system-ui,sans-serif"}}>{error}</div>}
      </Card>

      {plan&&<div style={{padding:"0 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"14px 0 10px",paddingLeft:2}}>
          <div style={{fontSize:14,color:T.text,fontStyle:"italic"}}>{plan.weekLabel||"Semana activa"}</div>
          <div style={{fontSize:10,color:T.textSoft,fontFamily:"system-ui,sans-serif"}}>Cargada: {fmt(plan.uploadedAt||today())}</div>
        </div>
        {Object.values(grouped).map(({date,day,items})=>{
          const isT=date===today(), allDone=items.every(s=>s.completed);
          return <div key={date+"_"+day} style={{background:"#fff",borderRadius:14,marginBottom:10,overflow:"hidden",border:`1px solid ${isT?T.accent:T.border}`,boxShadow:isT?"0 2px 8px rgba(224,92,42,0.12)":"0 1px 3px rgba(0,0,0,0.05)"}}>
            <div style={{background:isT?T.accentBg:T.bgMuted,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
